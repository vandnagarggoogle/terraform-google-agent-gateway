apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: agent-gateway-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Google Network Services Agent Gateway Module
    source:
      repo: https://github.com/vandnagarggoogle/terraform-google-agent-gateway.git
      sourceType: git
  ui:
    input:
      variables:
        description:
          name: description
          title: Description
        gateway_name:
          name: gateway_name
          title: Gateway Name
          regexValidation: ^[a-z](?:[a-z0-9-]{0,61}[a-z0-9])?$
          validation: Gateway name must start with a lowercase letter followed by up to 62 lowercase letters, numbers, or hyphens and cannot end with a hyphen.
        google_managed_governed_access_path:
          name: google_managed_governed_access_path
          title: Google Managed Governed Access Path
          enumValueLabels:
            - label: Agent to Anywhere
              value: AGENT_TO_ANYWHERE
            - label: Client to Agent
              value: CLIENT_TO_AGENT
        labels:
          name: labels
          title: Labels
        labels_str:
          name: labels_str
          title: Labels Str
        location:
          name: location
          title: Location
        network_config_egress_network_attachment:
          name: network_config_egress_network_attachment
          title: Network Config Egress Network Attachment
        project_id:
          name: project_id
          title: Project Id
        protocols:
          name: protocols
          title: Protocols
        registries:
          name: registries
          title: Registries
        self_managed_resource_uri:
          name: self_managed_resource_uri
          title: Self Managed Resource Uri
        timeout_create:
          name: timeout_create
          title: Timeout Create
        timeout_delete:
          name: timeout_delete
          title: Timeout Delete
        timeout_update:
          name: timeout_update
          title: Timeout Update
    runtime:
      outputs:
        agent_gateway_id:
          visibility: VISIBILITY_ROOT
        google_managed_gateway_type:
          visibility: VISIBILITY_ROOT
        mtls_endpoint:
          visibility: VISIBILITY_ROOT
