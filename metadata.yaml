apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: agent-gateway
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Google Network Services Agent Gateway Module
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-agent-gateway.git
      sourceType: git
    version: 0.4.2
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: simple_example
        location: examples/simple_example
  interfaces:
    variables:
      - name: project_id
        description: The GCP project ID where the Agent Gateway will be created.
        varType: string
        required: true
      - name: location
        description: The location of the Agent Gateway
        varType: string
        required: true
      - name: gateway_name
        description: The name of the Agent Gateway resource.
        varType: string
        required: true
      - name: labels
        description: A map of key/value labels to apply.
        varType: map(string)
        defaultValue: {}
      - name: registries
        description: "A list of Agent registries. Format: //agentregistry.googleapis.com/{version}/projects/{project}/locations/{location}"
        varType: list(string)
        defaultValue: []
      - name: description
        description: A free-text description of the resource.
        varType: string
      - name: google_managed_governed_access_path
        description: "Operating Mode of Agent Gateway when using Google Managed deployment. Conflicts with self_managed_resource_uri. Possible values: AGENT_TO_ANYWHERE, CLIENT_TO_AGENT."
        varType: string
      - name: self_managed_resource_uri
        description: A supported Google Cloud networking proxy URI in the Project and Location when using Self Managed deployment. Conflicts with google_managed_governed_access_path.
        varType: string
      - name: network_config_egress_network_attachment
        description: "The URI of the Network Attachment resource for egress in network_config. Format: projects/{project}/regions/{region}/networkAttachments/{name}"
        varType: string
      - name: timeout_create
        description: Timeout for creation.
        varType: string
        defaultValue: 30m
      - name: timeout_update
        description: Timeout for updates.
        varType: string
        defaultValue: 30m
      - name: timeout_delete
        description: Timeout for deletion.
        varType: string
        defaultValue: 30m
      - name: protocols
        description: List of protocols (e.g., ['MCP']).
        varType: list(string)
        defaultValue:
          - MCP
    outputs:
      - name: agent_gateway_id
        description: The full resource ID of the Agent Gateway.
        type: string
      - name: effective_labels
        description: All labels including those inherited from the provider.
        type:
          - map
          - string
      - name: google_managed_gateway_type
        description: The gateway type (operating mode) in case of a Google Managed gateway.
      - name: mtls_endpoint
        description: The mTLS Endpoint associated with this Agent Gateway for agent connections.
        type: string
      - name: root_certificates
        description: Root Certificates for Agents to validate this AgentGateway.
        type:
          - list
          - string
      - name: service_extensions_account
        description: Service Account used by Service Extensions to operate.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/networkservices.admin
          - roles/compute.networkAdmin
          - roles/iam.serviceAccountUser
          - roles/agentregistry.admin
    services:
      - networkservices.googleapis.com
      - compute.googleapis.com
      - networksecurity.googleapis.com
      - agentregistry.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 7.20.0"
      - source: hashicorp/google-beta
        version: ">= 7.20.0"
      - source: hashicorp/google-nightly
        version: 2026.4.8-7.27.0
